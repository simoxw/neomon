<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Neo-Mon Link</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string
      // and converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which will cause the browser to refresh the page without losing
      // the history objects.
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <div style="background: #020617; color: #22d3ee; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: monospace; text-transform: uppercase; letter-spacing: 0.2em;">
       Inizializzazione Neural Link...
    </div>
  </body>
</html>
